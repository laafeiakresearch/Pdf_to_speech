<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Pronunciation Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #6c63ff;
            --accent: #00e5ff;
            --dark: #0f0f1a;
            --card: #1a1a2e;
            --card2: #16213e;
            --text: #e0e0ff;
            --muted: #8888aa;
            --success: #00e676;
            --radius: 16px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(108,99,255,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0,229,255,0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .app-layout {
            position: relative;
            z-index: 1;
            display: flex;
            gap: 16px;
            padding: 16px;
            max-width: 1400px;
            margin: 0 auto;
            min-height: 100vh;
        }

        .left-panel { width: 300px; flex-shrink: 0; display: flex; flex-direction: column; gap: 14px; }
        .main-panel  { flex: 1; display: flex; flex-direction: column; gap: 14px; min-width: 0; }
        .right-panel { width: 210px; flex-shrink: 0; }

        .card {
            background: var(--card);
            border: 1px solid rgba(108,99,255,0.2);
            border-radius: var(--radius);
            padding: 18px;
        }
        .card-title {
            font-size: 0.72em; font-weight: 700;
            text-transform: uppercase; letter-spacing: 2px;
            color: var(--primary); margin-bottom: 14px;
        }

        .app-header { text-align: center; padding: 10px 0 4px; }
        .app-header .logo { font-size: 2em; animation: float 3s ease-in-out infinite; display: inline-block; }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
        .app-header h1 {
            font-size: 1.5em; font-weight: 800;
            background: linear-gradient(135deg, #6c63ff, #00e5ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .app-header p { color: var(--muted); font-size: 0.8em; margin-top: 4px; }

        .control-group { margin-bottom: 12px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label {
            display: block; font-size: 0.73em; font-weight: 600;
            color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
        }
        .control-group select {
            width: 100%; background: var(--card2);
            border: 1px solid rgba(108,99,255,0.3); border-radius: 8px;
            color: var(--text); padding: 8px 12px; font-size: 0.85em;
            font-family: 'Inter', sans-serif; cursor: pointer; outline: none;
        }
        .control-group select:focus { border-color: var(--primary); }

        .gender-tabs { display: flex; gap: 6px; }
        .gender-tab {
            flex: 1; padding: 7px 4px; border-radius: 8px;
            border: 1.5px solid rgba(108,99,255,0.3); background: transparent;
            color: var(--muted); cursor: pointer; font-size: 0.8em;
            font-family: 'Inter', sans-serif; transition: all 0.2s; text-align: center;
        }
        .gender-tab.active { background: rgba(108,99,255,0.2); border-color: var(--primary); color: var(--text); }

        .slider-row { display: flex; align-items: center; gap: 8px; }
        .slider-row input[type=range] {
            flex: 1; -webkit-appearance: none; height: 3px;
            background: rgba(108,99,255,0.3); border-radius: 2px; outline: none;
        }
        .slider-row input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 15px; height: 15px;
            background: var(--primary); border-radius: 50%; cursor: pointer;
        }
        .slider-val { font-size: 0.8em; color: var(--primary); font-weight: 600; width: 30px; text-align: right; }

        .test-row { display: flex; gap: 8px; margin-top: 12px; }
        .test-row input {
            flex: 1; background: var(--card2);
            border: 1px solid rgba(108,99,255,0.3); border-radius: 8px;
            color: var(--text); padding: 8px 12px; font-size: 0.85em;
            font-family: 'Inter', sans-serif; outline: none; min-width: 0;
        }

        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 16px; border-radius: 25px; border: none; cursor: pointer;
            font-family: 'Inter', sans-serif; font-size: 0.85em; font-weight: 600;
            transition: all 0.2s; white-space: nowrap;
        }
        .btn-primary { background: linear-gradient(135deg, #6c63ff, #5a52d5); color: white; box-shadow: 0 3px 15px rgba(108,99,255,0.4); }
        .btn-primary:hover { transform: translateY(-1px); }
        .btn-secondary { background: rgba(108,99,255,0.1); border: 1px solid rgba(108,99,255,0.4); color: var(--text); }
        .btn-secondary:hover { background: rgba(108,99,255,0.2); }
        .btn-success { background: linear-gradient(135deg, #00c853, #00e676); color: #0a1a0a; box-shadow: 0 3px 15px rgba(0,200,83,0.4); }
        .btn-success:hover { transform: translateY(-1px); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

        #upload-area {
            border: 2px dashed rgba(108,99,255,0.4); border-radius: var(--radius);
            padding: 28px 16px; text-align: center; cursor: pointer;
            transition: all 0.3s; background: rgba(108,99,255,0.03);
        }
        #upload-area:hover, #upload-area.drag { border-color: var(--primary); background: rgba(108,99,255,0.08); }
        #upload-area input { display: none; }
        #upload-area label { font-size: 1em; color: #6c63ff; cursor: pointer; display: block; margin-bottom: 4px; font-weight: 600; }
        #upload-area p { color: var(--muted); font-size: 0.78em; }

        #toolbar { display: none; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: space-between; }
        #page-info {
            background: rgba(108,99,255,0.15); border: 1px solid rgba(108,99,255,0.3);
            padding: 6px 14px; border-radius: 20px; font-weight: 600; font-size: 0.85em; color: var(--primary);
        }

        #status {
            display: none; padding: 10px 16px; border-radius: 10px;
            font-weight: 600; font-size: 0.85em; text-align: center;
        }

        /* ── Selection Speak Bar ── NEW ── */
        #selection-bar {
            display: none;
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card);
            border: 1px solid rgba(108,99,255,0.4);
            border-radius: 40px;
            padding: 10px 20px;
            gap: 12px;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            z-index: 9000;
            animation: barIn 0.25s ease;
            max-width: 90vw;
        }
        #selection-bar.visible { display: flex; }
        @keyframes barIn { from{transform:translateX(-50%) translateY(20px);opacity:0} to{transform:translateX(-50%) translateY(0);opacity:1} }
        #sel-text {
            color: var(--text); font-size: 0.88em; max-width: 300px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        #sel-text span { color: var(--primary); font-weight: 700; }

        #pdf-container {
            width: 100%; min-height: 75vh; overflow-y: auto; overflow-x: auto;
            background: #111122; border-radius: var(--radius); padding: 16px;
            display: flex; flex-direction: column; align-items: center;
            scrollbar-width: thin; scrollbar-color: var(--primary) transparent;
        }
        #pdf-container::-webkit-scrollbar { width: 6px; }
        #pdf-container::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

        .page-wrapper {
            position: relative; margin-bottom: 16px; border-radius: 8px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5); overflow: hidden; flex-shrink: 0;
        }
        canvas { display: block; }

        .textLayer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5; cursor: pointer;
        }
        .textLayer span {
            color: transparent; position: absolute; white-space: pre;
            cursor: pointer; transform-origin: 0% 0%; line-height: 1;
            border-radius: 3px; transition: background 0.15s;
        }
        .textLayer span:hover { background: rgba(108,99,255,0.3) !important; }
        .textLayer span.clicked { background: rgba(0,229,255,0.35) !important; animation: wordPop 0.3s ease; }
        @keyframes wordPop { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }

        /* Selection highlight override */
        .textLayer ::selection { background: rgba(108,99,255,0.5) !important; color: transparent; }

        .history-panel { position: sticky; top: 16px; }
        .history-list {
            display: flex; flex-direction: column; gap: 6px;
            max-height: calc(100vh - 180px); overflow-y: auto;
            scrollbar-width: thin; scrollbar-color: var(--primary) transparent;
        }
        .history-chip {
            background: rgba(108,99,255,0.1); border: 1px solid rgba(108,99,255,0.2);
            border-radius: 8px; padding: 8px 12px; font-size: 0.82em;
            cursor: pointer; transition: all 0.2s; color: var(--text);
            display: flex; align-items: center; gap: 6px; word-break: break-word;
        }
        .history-chip:hover { background: rgba(108,99,255,0.25); transform: translateX(-2px); }
        .history-chip .chip-icon { opacity: 0.6; font-size: 0.9em; flex-shrink: 0; }
        .no-history { color: var(--muted); font-size: 0.82em; text-align: center; padding: 20px 0; }

        /* Speak Bubble */
        #speak-bubble {
            position: fixed; bottom: 25px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(135deg, #6c63ff, #00e5ff);
            color: white; padding: 14px 26px; border-radius: 40px;
            font-size: 1em; font-weight: 700;
            box-shadow: 0 10px 40px rgba(108,99,255,0.6);
            z-index: 9999; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center; max-width: 80vw;
        }
        #speak-bubble.show { transform: translateX(-50%) translateY(0); }
        .bubble-label { font-size: 0.7em; opacity: 0.8; margin-bottom: 2px; }
        .bubble-word { font-size: 1.1em; word-break: break-word; }
        .wave-bars { display: flex; gap: 3px; align-items: center; height: 16px; justify-content: center; margin-top: 5px; }
        .wave-bar { width: 3px; background: white; border-radius: 2px; animation: wave 0.7s ease-in-out infinite; }
        .wave-bar:nth-child(1){animation-delay:.0s;height:5px}
        .wave-bar:nth-child(2){animation-delay:.1s;height:12px}
        .wave-bar:nth-child(3){animation-delay:.2s;height:8px}
        .wave-bar:nth-child(4){animation-delay:.3s;height:15px}
        .wave-bar:nth-child(5){animation-delay:.4s;height:6px}
        @keyframes wave { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(1.8)} }

        #voice-count { margin-top: 8px; font-size: 0.78em; color: var(--muted); }

        @media (max-width: 900px) {
            .app-layout { flex-direction: column; }
            .left-panel, .right-panel { width: 100%; }
            .history-panel { position: static; }
            .history-list { max-height: 160px; flex-direction: row; flex-wrap: wrap; }
        }
    </style>
</head>
<body>

<div class="app-layout">

    <!-- LEFT -->
    <div class="left-panel">
        <div class="app-header">
            <span class="logo">🎤</span>
            <h1>PDF Pronunciation Pro</h1>
            <p>Click word • Drag to select sentence</p>
        </div>

        <div class="card">
            <div class="card-title">⚡ Voice Settings</div>

            <div class="control-group">
                <label>🧑 Gender</label>
                <div class="gender-tabs">
                    <button class="gender-tab active" data-gender="all">All</button>
                    <button class="gender-tab" data-gender="female">♀ Female</button>
                    <button class="gender-tab" data-gender="male">♂ Male</button>
                </div>
            </div>

            <div class="control-group">
                <label>🌐 Language</label>
                <select id="lang-select">
                    <option value="en">🇬🇧 English</option>
                    <option value="de">🇩🇪 German</option>
                    <option value="fr">🇫🇷 French</option>
                    <option value="es">🇪🇸 Spanish</option>
                    <option value="hi">🇮🇳 Hindi</option>
                    <option value="zh">🇨🇳 Chinese</option>
                    <option value="ja">🇯🇵 Japanese</option>
                    <option value="ar">🇸🇦 Arabic</option>
                    <option value="pt">🇧🇷 Portuguese</option>
                    <option value="ru">🇷🇺 Russian</option>
                </select>
            </div>

            <div class="control-group">
                <label>🎙️ Voice</label>
                <select id="voice-select"><option>Loading...</option></select>
            </div>

            <div class="control-group">
                <label>🚀 Speed</label>
                <div class="slider-row">
                    <input type="range" id="rate-slider" min="0.4" max="1.8" step="0.1" value="0.85">
                    <span class="slider-val" id="rate-val">0.9</span>
                </div>
            </div>

            <div class="control-group">
                <label>🎵 Pitch</label>
                <div class="slider-row">
                    <input type="range" id="pitch-slider" min="0.5" max="2" step="0.1" value="1">
                    <span class="slider-val" id="pitch-val">1.0</span>
                </div>
            </div>

            <div class="control-group">
                <label>🔊 Volume</label>
                <div class="slider-row">
                    <input type="range" id="vol-slider" min="0" max="1" step="0.1" value="1">
                    <span class="slider-val" id="vol-val">1.0</span>
                </div>
            </div>

            <div class="test-row">
                <input type="text" id="test-input" placeholder="Test voice..." value="Hello, test!">
                <button class="btn btn-primary" id="btn-activate">🔊 Activate</button>
            </div>
            <div id="voice-count"></div>
        </div>

        <div id="upload-area">
            <input type="file" id="file-input" accept=".pdf">
            <label for="file-input">📂 Step 2 — Upload PDF</label>
            <p>Click or drag your PDF here</p>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main-panel">

        <div class="card" id="toolbar">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:space-between;">
                <div style="display:flex;gap:8px;align-items:center;">
                    <button class="btn btn-secondary" id="btn-prev">⬅ Prev</button>
                    <div id="page-info">Page 1 / 1</div>
                    <button class="btn btn-secondary" id="btn-next">Next ➡</button>
                </div>
                <div style="display:flex;gap:8px;align-items:center;">
                    <span style="color:var(--muted);font-size:0.8em;">💡 Click = word &nbsp;|&nbsp; Drag = sentence</span>
                </div>
            </div>
        </div>

        <div id="status"></div>

        <div id="pdf-container">
            <div style="color:var(--muted);text-align:center;padding:60px 20px;font-size:0.9em;">
                📄 Upload a PDF to get started
            </div>
        </div>
    </div>

    <!-- RIGHT (History) -->
    <div class="right-panel">
        <div class="card history-panel">
            <div class="card-title">🕘 History</div>
            <div class="history-list" id="history-list">
                <div class="no-history">No words yet.<br>Click words in PDF!</div>
            </div>
        </div>
    </div>
</div>

<!-- Selection Floating Bar -->
<div id="selection-bar">
    <div id="sel-text">🖊️ "<span id="sel-preview"></span>"</div>
    <button class="btn btn-success" id="btn-speak-sel">▶ Speak</button>
    <button class="btn btn-secondary" id="btn-dismiss-sel" style="padding:8px 12px;">✕</button>
</div>

<!-- Speak Bubble -->
<div id="speak-bubble">
    <div class="bubble-label" id="bubble-label">🔊 Speaking</div>
    <div class="bubble-word" id="bubble-word">—</div>
    <div class="wave-bars">
        <div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div>
    </div>
</div>

<script>
const PDFJS_VERSION = '3.11.174';
const s = document.createElement('script');
s.src = `https://cdnjs.cloudflare.com/ajax/libs/pdf.js/${PDFJS_VERSION}/pdf.min.js`;
s.onload = () => {
    pdfjsLib.GlobalWorkerOptions.workerSrc =
        `https://cdnjs.cloudflare.com/ajax/libs/pdf.js/${PDFJS_VERSION}/pdf.worker.min.js`;
    initApp();
};
document.head.appendChild(s);

function initApp() {
    let pdfDoc = null, currentPage = 1, totalPages = 0;
    let allVoices = [], filteredVoices = [];
    let activated = false, selectedGender = 'all';
    let historyWords = [];
    let selectionText = '';
    let selectionTimer = null;

    const $ = id => document.getElementById(id);

    const btnActivate   = $('btn-activate');
    const testInput     = $('test-input');
    const voiceCount    = $('voice-count');
    const langSelect    = $('lang-select');
    const voiceSelect   = $('voice-select');
    const rateSlider    = $('rate-slider');
    const pitchSlider   = $('pitch-slider');
    const volSlider     = $('vol-slider');
    const rateVal       = $('rate-val');
    const pitchVal      = $('pitch-val');
    const volVal        = $('vol-val');
    const uploadArea    = $('upload-area');
    const fileInput     = $('file-input');
    const toolbar       = $('toolbar');
    const btnPrev       = $('btn-prev');
    const btnNext       = $('btn-next');
    const pageInfo      = $('page-info');
    const statusEl      = $('status');
    const pdfContainer  = $('pdf-container');
    const bubble        = $('speak-bubble');
    const bubbleWord    = $('bubble-word');
    const bubbleLabel   = $('bubble-label');
    const historyList   = $('history-list');
    const selectionBar  = $('selection-bar');
    const selPreview    = $('sel-preview');
    const btnSpeakSel   = $('btn-speak-sel');
    const btnDismissSel = $('btn-dismiss-sel');

    // Sliders
    rateSlider.oninput  = () => rateVal.textContent  = parseFloat(rateSlider.value).toFixed(1);
    pitchSlider.oninput = () => pitchVal.textContent = parseFloat(pitchSlider.value).toFixed(1);
    volSlider.oninput   = () => volVal.textContent   = parseFloat(volSlider.value).toFixed(1);

    // Voices
    const loadVoices = () => {
        allVoices = window.speechSynthesis.getVoices();
        if (allVoices.length) {
            voiceCount.textContent = `✅ ${allVoices.length} voices ready`;
            populateVoices();
        }
    };
    window.speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    function populateVoices() {
        const lang = langSelect.value;
        filteredVoices = allVoices.filter(v => v.lang.toLowerCase().startsWith(lang));
        if (selectedGender === 'female') {
            filteredVoices = filteredVoices.filter(v =>
                /female|woman|girl|zira|susan|karen|samantha|victoria|moira|fiona|tessa|amelie|alice|anna|petra/i.test(v.name)
            );
        } else if (selectedGender === 'male') {
            filteredVoices = filteredVoices.filter(v =>
                /male|man|boy|daniel|david|mark|jorge|luca|reed|thomas|alex|fred/i.test(v.name)
            );
        }
        if (!filteredVoices.length) filteredVoices = allVoices.filter(v => v.lang.toLowerCase().startsWith(lang));
        if (!filteredVoices.length) filteredVoices = allVoices;

        voiceSelect.innerHTML = filteredVoices.map((v, i) =>
            `<option value="${i}">${v.name} (${v.lang})</option>`
        ).join('');
    }

    langSelect.onchange = populateVoices;

    document.querySelectorAll('.gender-tab').forEach(tab => {
        tab.onclick = () => {
            document.querySelectorAll('.gender-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            selectedGender = tab.dataset.gender;
            populateVoices();
        };
    });

    // Activate
    btnActivate.onclick = () => {
        activated = true;
        speak(testInput.value || 'Hello!');
        setStatus('✅ Voice activated! Upload your PDF.', '#0d2b1a', '#00e676');
    };

    // Upload
    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.ondragover = e => { e.preventDefault(); uploadArea.classList.add('drag'); };
    uploadArea.ondragleave = () => uploadArea.classList.remove('drag');
    uploadArea.ondrop = e => {
        e.preventDefault(); uploadArea.classList.remove('drag');
        if (e.dataTransfer.files[0]?.type === 'application/pdf') loadPDF(e.dataTransfer.files[0]);
    };
    fileInput.onchange = e => { if (e.target.files[0]) loadPDF(e.target.files[0]); };

    async function loadPDF(file) {
        if (!activated) return alert('Please click "🔊 Activate" first!');
        setStatus('⏳ Loading PDF...', '#1a1500', '#ffd740');
        const buf = await file.arrayBuffer();
        pdfDoc = await pdfjsLib.getDocument({ data: buf }).promise;
        totalPages = pdfDoc.numPages;
        currentPage = 1;
        toolbar.style.display = 'block';

        uploadArea.innerHTML = `
            <div style="text-align:center;padding:12px;">
                <span style="color:var(--success);font-size:1em;font-weight:700;">✅ ${file.name}</span><br>
                <span style="color:var(--muted);font-size:0.78em;">${totalPages} pages loaded</span><br>
                <label for="file-input" style="color:var(--primary);font-size:0.8em;cursor:pointer;margin-top:6px;display:inline-block;">🔄 Change PDF</label>
                <input type="file" id="file-input" accept=".pdf" style="display:none;">
            </div>`;
        $('file-input').onchange = e => { if (e.target.files[0]) loadPDF(e.target.files[0]); };

        setStatus(`📄 ${totalPages} pages — Click word or drag to select a sentence!`, '#0d2b1a', '#00e676');
        await renderPage(currentPage);
        updateNav();
    }

    btnPrev.onclick = () => { if (currentPage > 1) { currentPage--; renderPage(currentPage); updateNav(); } };
    btnNext.onclick = () => { if (currentPage < totalPages) { currentPage++; renderPage(currentPage); updateNav(); } };

    function updateNav() {
        pageInfo.textContent = `Page ${currentPage} / ${totalPages}`;
        btnPrev.disabled = currentPage === 1;
        btnNext.disabled = currentPage === totalPages;
    }

    // ── SELECTION DETECTION ─────────────────────────────────────────
    document.addEventListener('mouseup', () => {
        clearTimeout(selectionTimer);
        selectionTimer = setTimeout(() => {
            const sel = window.getSelection();
            const text = sel.toString().trim();
            if (text && text.length > 1) {
                selectionText = text;
                // Show max 40 chars in preview
                selPreview.textContent = text.length > 40 ? text.slice(0, 40) + '…' : text;
                selectionBar.classList.add('visible');
            } else {
                hideSelectionBar();
            }
        }, 200);
    });

    document.addEventListener('touchend', () => {
        clearTimeout(selectionTimer);
        selectionTimer = setTimeout(() => {
            const text = window.getSelection().toString().trim();
            if (text && text.length > 1) {
                selectionText = text;
                selPreview.textContent = text.length > 40 ? text.slice(0, 40) + '…' : text;
                selectionBar.classList.add('visible');
            }
        }, 300);
    });

    // Speak selection button
    btnSpeakSel.onclick = () => {
        if (selectionText) {
            speak(selectionText, true); // true = sentence mode
            hideSelectionBar();
        }
    };

    btnDismissSel.onclick = () => {
        hideSelectionBar();
        window.getSelection().removeAllRanges();
    };

    function hideSelectionBar() {
        selectionBar.classList.remove('visible');
        selectionText = '';
    }

    // ── RENDER PAGE ─────────────────────────────────────────────────
    async function renderPage(num) {
        pdfContainer.innerHTML = '';
        hideSelectionBar();
        const page = await pdfDoc.getPage(num);
        const containerWidth = pdfContainer.clientWidth - 32;
        const unscaled = page.getViewport({ scale: 1 });
        const scale = Math.max(1.2, Math.min(2.0, containerWidth / unscaled.width));
        const viewport = page.getViewport({ scale });

        const wrapper = document.createElement('div');
        wrapper.className = 'page-wrapper';
        wrapper.style.width  = viewport.width + 'px';
        wrapper.style.height = viewport.height + 'px';

        const canvas = document.createElement('canvas');
        canvas.width  = viewport.width;
        canvas.height = viewport.height;
        await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

        const textLayerDiv = document.createElement('div');
        textLayerDiv.className = 'textLayer';

        wrapper.appendChild(canvas);
        wrapper.appendChild(textLayerDiv);
        pdfContainer.appendChild(wrapper);

        const textContent = await page.getTextContent();
        textContent.items.forEach(item => {
            if (!item.str.trim()) return;
            const tx = pdfjsLib.Util.transform(viewport.transform, item.transform);
            const span = document.createElement('span');
            span.textContent = item.str;
            span.style.left       = tx[4] + 'px';
            span.style.top        = (tx[5] - item.height * scale) + 'px';
            span.style.fontSize   = Math.abs(tx[0]) + 'px';
            span.style.fontFamily = item.fontName || 'sans-serif';
            span.title = 'Click = word | Drag = sentence';

            span.onclick = e => {
                // Only single click (no drag selection)
                const selText = window.getSelection().toString().trim();
                if (selText.length > 1) return; // user is selecting, not clicking
                e.stopPropagation();
                const word = getWordAt(e, span);
                if (word) { highlightSpan(span); speak(word, false); }
            };

            textLayerDiv.appendChild(span);
        });
    }

    // Word at cursor
    function getWordAt(e, span) {
        if (document.caretRangeFromPoint) {
            const range = document.caretRangeFromPoint(e.clientX, e.clientY);
            if (range?.startContainer?.nodeType === Node.TEXT_NODE) {
                const txt = range.startContainer.textContent;
                const off = range.startOffset;
                let s = off, end = off;
                while (s > 0 && /\S/.test(txt[s-1])) s--;
                while (end < txt.length && /\S/.test(txt[end])) end++;
                const word = txt.slice(s, end).replace(/[^\p{L}'-]/gu, '');
                if (word) return word;
            }
        }
        return span.textContent.trim().split(/\s+/)[0].replace(/[^\p{L}'-]/gu, '') || span.textContent.trim();
    }

    // Highlight span
    let lastSpan = null;
    function highlightSpan(span) {
        if (lastSpan) lastSpan.classList.remove('clicked');
        span.classList.add('clicked');
        lastSpan = span;
        setTimeout(() => span.classList.remove('clicked'), 1200);
    }

    // History
    function addHistory(text) {
        const label = text.length > 25 ? text.slice(0, 25) + '…' : text;
        if (historyWords[0]?.text === text) return;
        historyWords = [{ text, label }, ...historyWords.filter(w => w.text !== text)].slice(0, 40);
        historyList.innerHTML = historyWords.map(w =>
            `<div class="history-chip" onclick="window.__speak(${JSON.stringify(w.text)}, true)">
                <span class="chip-icon">🔊</span>${w.label}
            </div>`
        ).join('');
    }

    window.__speak = (text, sentence) => speak(text, sentence);

    // ── SPEAK ───────────────────────────────────────────────────────
    let bubbleTimer;
    function speak(text, isSentence = false) {
        if (!text) return;
        window.speechSynthesis.cancel();

        const utter = new SpeechSynthesisUtterance(text);
        const idx = parseInt(voiceSelect.value) || 0;
        if (filteredVoices[idx]) utter.voice = filteredVoices[idx];
        utter.rate   = parseFloat(rateSlider.value);
        utter.pitch  = parseFloat(pitchSlider.value);
        utter.volume = parseFloat(volSlider.value);
        utter.lang   = langSelect.value;
        utter.onerror = e => console.error('TTS:', e.error);
        window.speechSynthesis.speak(utter);

        // Bubble display
        const display = text.length > 50 ? text.slice(0, 50) + '…' : text;
        bubbleLabel.textContent = isSentence ? '🔊 Reading Sentence' : '🔊 Speaking Word';
        bubbleWord.textContent = display;
        bubble.classList.add('show');
        clearTimeout(bubbleTimer);

        // Longer display time for sentences
        const displayTime = isSentence ? Math.max(3000, text.length * 60) : 2500;
        bubbleTimer = setTimeout(() => bubble.classList.remove('show'), displayTime);

        addHistory(text);
    }

    // Status
    function setStatus(msg, bg, color) {
        statusEl.style.cssText = `display:block;background:${bg};color:${color};padding:10px 16px;border-radius:10px;font-weight:600;font-size:0.85em;text-align:center;margin-bottom:10px;`;
        statusEl.textContent = msg;
    }
}
</script>
</body>
