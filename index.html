<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Text Reader - Premium TTS</title>
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://unpkg.com/@xenova/transformers@2.17.2/dist/transformers.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <div class="logo">
        <svg class="volume-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2a2 2 0 0 0-2 2v16a2 2 0 0 0 4 0V4a2 2 0 0 0-2-2z"/>
          <path d="M17.5 12c0 2.76-2.24 5-5 5s-5-2.24-5-5 2.24-5 5-5 5 2.24 5 5z"/>
        </svg>
        <h1>AI Reader</h1>
      </div>
      <button class="theme-toggle" aria-label="Toggle theme">
        <svg class="sun-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/></svg>
        <svg class="moon-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <!-- Upload Panel -->
  <main class="main-content" id="upload-panel">
    <section class="upload-section">
      <div class="upload-area" id="upload-area">
        <div class="upload-icon">📁</div>
        <h2>Upload Document</h2>
        <p>PDF, TXT files or paste text directly</p>
        <div class="upload-buttons">
          <input type="file" id="file-input" accept=".pdf,.txt" hidden>
          <button class="upload-btn" onclick="document.getElementById('file-input').click()">
            📄 Upload File
          </button>
          <button class="upload-btn" onclick="pasteText()">📋 Paste Text</button>
        </div>
        <textarea id="text-input" placeholder="Or type your text here..." rows="5"></textarea>
      </div>
    </section>
  </main>

  <!-- Reader Panel -->
  <main class="main-content hidden" id="reader-panel">
    <section class="voice-section">
      <h3>🎙️ Choose Your Voice</h3>
      <div class="voice-grid" id="voice-grid"></div>
    </section>

    <section class="controls-section">
      <div class="lang-toggle">
        <button id="lang-toggle-btn" class="toggle-btn">Translation</button>
        <span id="lang-display" class="lang-badge">en</span>
      </div>
    </section>

    <section class="reader-section">
      <div class="text-container" id="text-container"></div>
    </section>

    <section class="audio-controls">
      <div class="controls-container">
        <div class="play-controls">
          <button class="control-btn play-btn" id="play-btn">▶️</button>
          <div class="voice-info">
            <div id="voice-name" class="voice-label">Deep Professional</div>
            <div id="speed-display" class="speed-label">1x</div>
          </div>
        </div>
        <div class="speed-controls">
          <button class="speed-btn active" data-speed="0.75">0.75x</button>
          <button class="speed-btn" data-speed="1">1x</button>
          <button class="speed-btn" data-speed="1.5">1.5x</button>
          <button class="speed-btn" data-speed="2">2x</button>
        </div>
      </div>
    </section>
  </main>

  <!-- Loading Overlay -->
  <div class="loading-overlay hidden" id="loading-overlay">
    <div class="loader">⏳ Processing...</div>
  </div>

  <script src="js/pdf.worker.js"></script>
  <script src="js/language-detector.js"></script>
  <script src="js/tts-engine.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
